<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./img/favicon_barueri3.svg" width="32" height="32" type="image/svg+xml">
  <title>Busca de Escolas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50 min-h-screen">
  <header class="text-white shadow-lg fixed-header">
    <div class="container mx-auto px-4 py-6">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="flex items-center mb-4 md:mb-0">
          <img src="img/logo_Barueri_Educ_PNG.png" alt="Logo Barueri Educação" class="header-logo mr-3">
          <h1 class="text-2xl md:text-3xl font-bold">Busca de Escolas</h1>
        </div>
        <nav aria-label="Busca e menu" class="flex flex-col md:flex-row items-center w-full md:w-auto">
          <div class="relative w-full md:w-96">
            <input type="text" id="searchInput" placeholder="Buscar por escola, bairro, diretor(a) ou equipe..." class="w-full px-4 py-2 rounded-full text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button id="searchBtn" class="absolute right-0 top-0 h-full px-4 text-blue-600 rounded-r-full bg-white hover:bg-gray-100">
              <i class="fas fa-search"></i>
            </button>
          </div>
          <button id="exportExcelBtn" class="ml-4 w-10 h-10 flex items-center justify-center rounded bg-white text-green-700 hover:bg-green-50" title="Exportar para Excel" aria-label="Exportar para Excel">
            <i class="fas fa-file-excel"></i>
          </button>
          <div class="ml-4 relative">
            <button id="menuBtn" class="flex flex-col justify-center items-center w-10 h-10 rounded hover:bg-blue-600 focus:outline-none" aria-label="Abrir menu">
              <span class="block w-6 h-0.5 bg-white mb-1"></span>
              <span class="block w-6 h-0.5 bg-white mb-1"></span>
              <span class="block w-6 h-0.5 bg-white"></span>
            </button>
            <div id="menuDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded shadow-lg z-50">
              <a href="escolas.html" class="block px-4 py-2 text-gray-800 hover:bg-blue-100">Escolas</a>
              <a href="ramais.html" class="block px-4 py-2 text-gray-800 hover:bg-blue-100">Ramais</a>
              <a href="calendarioemef.html" class="block px-4 py-2 text-gray-800 hover:bg-blue-100">Calendário EMEF</a>
              <a href="calendarioemei.html" class="block px-4 py-2 text-gray-800 hover:bg-blue-100">Calendário EMEI</a>
              <a href="calendariomaternal.html" class="block px-4 py-2 text-gray-800 hover:bg-blue-100">Calendário Maternal</a>
            </div>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-4 py-8 main-content">
    <div class="bg-white rounded-lg shadow-md p-4 mb-6">
      <div class="flex flex-col lg:flex-row lg:items-center gap-4">
        <div class="w-full lg:w-[220px] min-w-0">
          <label for="neighborhoodFilter" class="block text-sm font-medium text-gray-700 mb-2">Bairro</label>
          <select id="neighborhoodFilter" class="w-full px-2 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
            <option value="">Todos os bairros</option>
          </select>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-700 mb-2">Tipo de escola</p>
          <div class="flex flex-wrap gap-2 items-center overflow-x-auto py-1 min-w-0">
            <label class="filter-pill" style="--pill-color:#5072e4">
              <input type="checkbox" class="filter-checkbox" value="EMEF" checked>
              <span><i class="fas fa-school"></i>EMEF</span>
            </label>
            <label class="filter-pill" style="--pill-color:#e958a0">
              <input type="checkbox" class="filter-checkbox" value="EMEI" checked>
              <span><i class="fas fa-child"></i>EMEI</span>
            </label>
            <label class="filter-pill" style="--pill-color:#f19f40">
              <input type="checkbox" class="filter-checkbox" value="EMEIEF" checked>
              <span><i class="fas fa-book-open"></i>EMEIEF</span>
            </label>
            <label class="filter-pill" style="--pill-color:#935ef0">
              <input type="checkbox" class="filter-checkbox" value="EMM" checked>
              <span><i class="fas fa-flask"></i>EMM</span>
            </label>
            <label class="filter-pill" style="--pill-color:#ec5050">
              <input type="checkbox" class="filter-checkbox" value="EMMEI" checked>
              <span><i class="fas fa-user-graduate"></i>EMMEI</span>
            </label>
            <label class="filter-pill" style="--pill-color:#9da3af">
              <input type="checkbox" class="filter-checkbox" value="OS" checked>
              <span><i class="fas fa-building"></i>OS</span>
            </label>
            <label class="filter-pill" style="--pill-color:#111827">
              <input type="checkbox" class="filter-checkbox" value="CRI" checked>
              <span><i class="fas fa-baby"></i>CRI</span>
            </label>
            <label class="filter-pill" style="--pill-color:#06b6d4">
              <input type="checkbox" class="filter-checkbox" value="INTEGRAL" checked>
              <span><i class="fas fa-star"></i>INTEGRAL</span>
            </label>
          </div>
        </div>
        <button id="resetFilters" type="button" class="w-full lg:w-auto self-start lg:self-auto h-10 px-3 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-md transition text-sm">Limpar Filtros</button>
      </div>
    </div>

    <section class="w-full" aria-label="Resultados">
      <div class="flex flex-col lg:flex-row lg:items-center justify-between mb-6 gap-4">
        <h2 class="text-xl font-semibold text-gray-800">Escolas e Equipes de Referência</h2>
        <div class="text-gray-600">
          <span id="resultCount">4</span> resultados
        </div>
      </div>

      <div id="schoolsContainer" class="space-y-4">
        <!-- School cards will be dynamically inserted here -->
      </div>
    </section>
  </main>

  <footer class="bg-gray-800 text-white py-8">
    <div class="container mx-auto px-4">
      <div class="flex flex-col md:flex-row justify-between">
        <div class="mb-6 md:mb-0">
          <h3 class="text-xl font-semibold mb-4">Secretaria da Educação</h3>
          <p class="text-gray-400">.</p>
        </div>
        <div class="mb-6 md:mb-0">
          <h3 class="text-xl font-semibold mb-4">Contato</h3>
          <p class="text-gray-400">
            <i class="fas fa-phone mr-2"></i> (11) 4199-2900
            <a href="ramais.html" class="ml-2 text-blue-400 hover:text-blue-300">Ramais da SE</a>
          </p>
        </div>
        <div>
          <h3 class="text-xl font-semibold mb-4">Redes Sociais</h3>
          <div class="flex space-x-4">
            <a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-facebook-f text-xl"></i></a>
            <a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-twitter text-xl"></i></a>
            <a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-instagram text-xl"></i></a>
          </div>
        </div>
      </div>
      <div class="border-t border-gray-700 mt-6 pt-6 text-center text-gray-400">
        <p>&copy; 2023 Busca de Escolas. Todos os direitos reservados.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/script.js"></script>
  <script>
    // Menu hambúrguer toggle
    const menuBtn = document.getElementById('menuBtn');
    const menuDropdown = document.getElementById('menuDropdown');
    document.addEventListener('click', function (e) {
      if (menuBtn && menuDropdown) {
        if (menuBtn.contains(e.target)) {
          menuDropdown.classList.toggle('hidden');
        } else if (!menuDropdown.contains(e.target)) {
          menuDropdown.classList.add('hidden');
        }
      }
    });
  </script>
</body>

</html>
